<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>불법주차 관제 대시보드 (PoC)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
        }
        .video-container {
            background-color: #000;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }
        .status-badge {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>차량 불법주차 관제 시스템 (PoC)</h1>
    <div class="status-badge">카메라 스트리밍 중 🟢</div>

    <div class="video-container">
        <!-- 서버의 /video_feed 엔드포인트를 이미지 소스로 사용하여 실시간 영상 표시 -->
        <img src="/video_feed" alt="실시간 카메라 영상 스트림">
    </div>

</body>
</html>
